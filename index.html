<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sombrero Seleccionador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imgs/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="c-flex">
        <h1>🔮🎩 Colegio Hogwarts de Magia y Hechicería 🎩🔮</h1>
    </header>

    <main class="c-flex">
        <h2>Panel de Jefes y Prefectos</h2>

        <section class="cantidadSection c-flex">
            <h3>Cantidad de estudiantes</h3>

            <div class="cantidadInputs">
                <div>
                    <label for="gryffindorInput" class="cantidadLabel">❤️ Gryffindor</label>
                    <input type="number" id="gryffindorInput" class="cantidadInput" value="9">
                </div>

                <div>
                    <label for="ravenclawInput" class="cantidadLabel">💙 Ravenclaw</label>
                    <input type="number" id="ravenclawInput" class="cantidadInput" value="15">
                </div>

                <div>
                    <label for="hufflepuffInput" class="cantidadLabel">💛 Hufflepuff</label>
                    <input type="number" id="hufflepuffInput" class="cantidadInput" value="8">
                </div>

                <div>
                    <label for="slytherinInput" class="cantidadLabel">💚 Slytherin</label>
                    <input type="number" id="slytherinInput" class="cantidadInput" value="10">
                </div>
            </div>
        </section>

        <section class="respuestasSection c-flex">
            <h3>Respuestas del sombrero</h3>

            <div>
                <label for="respuestasTexto">Mensaje</label>
                <input type="text" id="respuestasTexto" class="respuestasInput">

                <button class="limpiarButton" onclick="limpiarRespuestas()">Limpiar</button>
            </div>

            <button class="respuestasButton" onclick="procesarRespuestas()">🎩 Asignar Casa</button>
        </section>

        <section class="resultadoSection c-flex">
            <p id="puntos"></p>
            <h3 id="resultado"></h3>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
